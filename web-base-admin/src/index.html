<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coffee Background</title>
  <style>
    /* Remove all default margins/padding from the page */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    /* Background container */
    .background {
      width: 100vw;
      height: 100vh;

      /* Your background image */
      background-image: url("coffee-pattern.png"); /* change to your file */
      
      background-repeat: repeat;   /* repeats nicely */
      background-size: auto;       /* keeps natural pattern size */
      background-position: center;
    }
  </style>
</head>
<body>
  <div class="background"></div>
</body>
</html>
